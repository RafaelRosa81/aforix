# Aforix SIH export module configuration
#
# This file is intentionally declarative. Python code must not hardcode SIH IDs,
# SIH column names, source column names, thresholds, or output naming rules.

sih:
  enabled: true

  inputs:
    normalized_input_dir: database/normalized
    raw_canonical_input_dir: database/raw_canonical
    quality_input_dir: database/analysis/quality_metrics

  output:
    output_dir: outputs/sih
    delimiter: ","
    encoding: utf-8-sig
    output_names:
      actuaciones: "ID_{export_id}_actuacion_{station_id}_{YYYYMMDD}_{HHMMSS}.csv"
      aforos: "ID_{export_id}_aforo_{station_id}_{YYYYMMDD}_{HHMMSS}.csv"

  lookup_files:
    instrumentos: configs/sih/instrumentos.csv
    tipos_aforos: configs/sih/tipos_aforos.csv
    instrumentos_rangos: configs/sih/instrumentos_rangos.csv

  datetime:
    source_date_column: measurement_date
    source_time_column: measurement_time
    output_format: "%d/%m/%Y %H:%M:%S"
    filename_date_format: "%Y%m%d"
    filename_time_format: "%H%M%S"

  selection:
    default_mode: batch_file
    batch_file:
      enabled: true
      path: configs/sih/selection_template.csv
      columns:
        station_id: station_id
        measurement_date: measurement_date
        measurement_time: measurement_time
        instrument: instrument
        export_id: export_id

  defaults:
    empty_autogenerated_ids: true
    pendiente: false
    relevante: false
    id_perfil: null

  station_mapping:
    source:
      dataset: normalized
      table: Summary
      column: station_id
    mode: direct

  lookup_tables:
    instrumentos:
      file: instrumentos
      key_column: codigo
      value_column: id
    tipos_aforos:
      file: tipos_aforos
      key_column: descripcion
      value_column: id
    instrumentos_rangos:
      file: instrumentos_rangos
      key_column: descripcion
      value_column: id

  instruments:
    flowtracker:
      enabled: true
      aforix_code: FT
      normalized_name: flowtracker
      id_instrumento: 501
      id_tipo_actuacion: 4
      tipo_aforo_lookup: Vadeo
      instrumentos_rangos_lookup: Velocimetro puntual

      raw_canonical_fields:
        id_operador: operators
        lectura_escala: null
        escala_inicio: null
        escala_fin: null
        escala_media: null
        observaciones: null
        radio_hidraulico: null

      normalized_fields:
        ancho: width_total_m
        caudal: q_total_m3s
        profundidad: depth_mean_m
        seccion: area_total_m2
        velocidad_media: velocity_mean_m_s
        fecha_inicio_date: measurement_date
        fecha_inicio_time: measurement_time
        fecha_fin_date: measurement_date
        fecha_fin_time: measurement_time

      quality:
        enabled: false
        source: null
        parameter: null
        thresholds: {}

    molinete:
      enabled: true
      aforix_code: ML
      normalized_name: molinete
      id_instrumento: null
      id_tipo_actuacion: 4
      tipo_aforo_lookup: Vadeo
      instrumentos_rangos_lookup: Velocimetro puntual

      raw_canonical_fields:
        id_operador: realizado
        lectura_escala: escala_media
        escala_inicio: esc_ini_m
        escala_fin: esc_fin_m
        escala_media: escala_media
        observaciones: observaciones
        radio_hidraulico: radio_hidraulico_m

      normalized_fields:
        ancho: width_total_m
        caudal: q_total_m3s
        profundidad: depth_mean_m
        seccion: area_total_m2
        velocidad_media: velocity_mean_m_s
        fecha_inicio_date: measurement_date
        fecha_inicio_time: measurement_time
        fecha_fin_date: measurement_date
        fecha_fin_time: measurement_time

      quality:
        enabled: false
        source: null
        parameter: null
        thresholds: {}

    nivus:
      enabled: true
      aforix_code: NV
      normalized_name: nivus
      id_instrumento: 502
      id_tipo_actuacion: 4
      tipo_aforo_lookup: Acustico
      instrumentos_rangos_lookup: Doppler acustico

      raw_canonical_fields:
        id_operador: null
        lectura_escala: null
        escala_inicio: null
        escala_fin: null
        escala_media: null
        observaciones: notes
        radio_hidraulico: "rh [m]"

      normalized_fields:
        ancho: width_total_m
        caudal: q_total_m3s
        profundidad: depth_mean_m
        seccion: area_total_m2
        velocidad_media: velocity_mean_m_s
        fecha_inicio_date: measurement_date
        fecha_inicio_time: measurement_time
        fecha_fin_date: measurement_date
        fecha_fin_time: measurement_time

      quality:
        enabled: true
        source: quality_metrics
        parameter: "CG(%)"
        thresholds:
          bueno:
            min: 70
          regular:
            min: 40
            max_lt: 70
          malo:
            max_lt: 40

    m9:
      enabled: false
      aforix_code: M9
      normalized_name: m9
      id_instrumento: null
      id_tipo_actuacion: null
      tipo_aforo_lookup: ADCP
      instrumentos_rangos_lookup: ADCP movil
      raw_canonical_fields: {}
      normalized_fields: {}
      quality:
        enabled: false
        source: null
        parameter: null
        thresholds: {}
