project:
  name: aforix
  description: Pipeline para procesamiento de datos de aforos
  timezone: America/Montevideo

paths:
  raw_data_dir: data/raw
  runs_root: runs
  database_root: database

ingest:
  flowtracker:
    enabled: true
    raw_subdir: FT
    spec_path: configs/specs/flowtracker.yaml

  molinete:
    enabled: true
    raw_subdir: ML
    sheet_name: CALCULO

  nivus:
    enabled: true
    raw_subdir: NV

  m9:
    enabled: true
    raw_subdir: M9

build_groups:
  enabled: true
  input_runs_root: runs
  output_dir: database/raw_canonical

  groups:
    - Summary
    - Points
    - Sections
    - Gates

  concat_groups:
    - Summary

  sources:
    - flowtracker
    - molinete
    - nivus

normalize:
  enabled: true
  registry_dir: configs/normalization
  input_dir: database/raw_canonical
  output_dir: database/normalized

  groups:
    - Summary
    - Points
    - Sections
    - Gates

  concat_groups:
    - Summary
    - Points

  sources:
    - flowtracker
    - molinete
    - nivus

validation:
  enabled: true
  strict: false
  input_dir: database/normalized
  output_dir: database/validation

  traceability_columns:
    - station_id
    - station_name
    - measurement_date
    - measurement_time
    - instrument
    - source_file
    - source_run_dir
    - run_id

  keys:
    - instrument
    - station_id
    - measurement_date
    - measurement_time

export:
  tables:
    enabled: true
    input_dir: database/normalized
    output_dir: outputs/tables

  excel:
    enabled: true
    input_dir: database/normalized
    output_dir: outputs/excel