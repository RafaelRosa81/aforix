project:
  name: aforix
  description: Pipeline para procesamiento de datos de aforos
  timezone: America/Montevideo

paths:
  raw_data_dir: data/raw
  runs_root: runs
  database_root: database

ingest:
  flowtracker:
    enabled: true
    raw_subdir: FT
    spec_path: configs/specs/flowtracker.yaml

  molinete:
    enabled: true
    raw_subdir: ML
    sheet_name: CALCULO

    metadata_policy:
      station_id:
        strategy: first_non_empty
        sources:
          - type: raw_field
            key: station_id
          - type: raw_field
            key: fallback_station_id
          - type: path_regex
            pattern: "P(?P<value>\\d{1,4})"
        transforms:
          - strip
          - uppercase
          - name: remove_prefix
            value: "P"
          - digits_only
        normalize:
          digits_only: true

      station_name:
        strategy: first_non_empty
        sources:
          - type: raw_field
            key: station_name
        transforms:
          - strip

      measurement_date:
        strategy: first_non_empty
        sources:
          - type: raw_field
            key: measurement_date
        normalize:
          input_formats:
            - "%Y%m%d"
            - "%Y-%m-%d"
            - "%Y/%m/%d"
            - "%m/%d/%Y"
            - "%d/%m/%Y"
            - "%Y-%m-%d %H:%M:%S"
            - "%Y/%m/%d %H:%M:%S"
            - "%m/%d/%Y %H:%M:%S"
            - "%d/%m/%Y %H:%M:%S"
          output_format: "%Y%m%d"

      measurement_time:
        strategy: first_non_empty
        sources:
          - type: raw_field
            key: measurement_time
        normalize:
          input_formats:
            - "%H%M%S"
            - "%H:%M:%S"
            - "%H:%M"
            - "%Y-%m-%d %H:%M:%S"
            - "%Y/%m/%d %H:%M:%S"
            - "%m/%d/%Y %H:%M:%S"
            - "%d/%m/%Y %H:%M:%S"
          output_format: "%H%M%S"

  nivus:
    enabled: true
    raw_subdir: NV

  m9:
    enabled: true
    raw_subdir: M9

build_groups:
  enabled: true
  input_runs_root: runs
  output_dir: database/raw_canonical

  groups:
    - Summary
    - Points
    - Sections
    - Gates

  concat_groups:
    - Summary

  sources:
    - flowtracker
    - molinete
    - nivus

normalize:
  enabled: true
  registry_dir: configs/normalization
  input_dir: database/raw_canonical
  output_dir: database/normalized

  groups:
    - Summary
    - Points
    - Sections
    - Gates

  concat_groups:
    - Summary
    - Points

  sources:
    - flowtracker
    - molinete
    - nivus

validation:
  enabled: true
  strict: false
  input_dir: database/normalized
  output_dir: database/validation

  traceability_columns:
    - station_id
    - station_name
    - measurement_date
    - measurement_time
    - instrument
    - source_file
    - source_run_dir
    - run_id

  keys:
    - instrument
    - station_id
    - measurement_date
    - measurement_time

  checks:
    required_columns: true
    duplicates: true
    completeness: true
    ranges: true
    hydraulic_consistency: true

  required_columns:
    Summary:
      - station_id
      - station_name
      - measurement_date
      - measurement_time
      - instrument
      - source_file
      - source_run_dir
      - run_id
      - q_total_m3s
      - q_total_ls
      - area_total_m2
    Points:
      - station_id
      - station_name
      - measurement_date
      - measurement_time
      - instrument
      - source_file
      - source_run_dir
      - run_id
      - point_index
      - distance_m
      - depth_m
      - area_m2
      - q_m3s
      - q_ls

  completeness:
    critical_columns:
      Summary:
        - station_id
        - measurement_date
        - measurement_time
        - instrument
        - q_total_m3s
      Points:
        - station_id
        - measurement_date
        - measurement_time
        - instrument
        - q_m3s

  hydraulic_consistency:
    q_tolerance_pct: 1.0
    area_tolerance_pct: 1.0

  ranges:
    Summary:
      area_total_m2:
        min: 0
      width_total_m:
        min: 0
      depth_mean_m:
        min: 0
      temperature_c:
        min: -5
        max: 45
    Points:
      depth_m:
        min: 0
      area_m2:
        min: 0
      temperature_c:
        min: -5
        max: 45

export:
  tables:
    enabled: true
    input_dir: database/normalized
    output_dir: outputs/tables

  excel:
    enabled: true
    input_dir: database/normalized
    output_dir: outputs/excel

external_sources:
  model:
    raw_dir: database/external/raw/model
    normalized_dir: database/external/normalized/model

  dinagua:
    raw_dir: database/external/raw/dinagua
    normalized_dir: database/external/normalized/dinagua

  manual_stage:
    enabled: true
    raw_dir: data/external/manual_stage
    normalized_dir: database/external/normalized/manual_stage

analysis:
  correlation:
    output_root: runs/analysis_correlation
    default_ranking:
      - NV
      - FT
      - ML
    variable_roles:
      gauges_vs_model:
        x: model
        y: gauge
      gauges_vs_stations:
        x: station
        y: gauge
      model_vs_stations:
        x: station
        y: model

  quality_metrics:
    enabled: true
    input_dirs:
      normalized_root: database/normalized
      raw_canonical_root: database/raw_canonical
    output_root: runs/analysis_quality_metrics

    instruments:
      nivus:
        enabled: true
        tables:
          normalized_points: nivus/Points
          raw_points: nivus/Points
        columns:
          weight_column: percent_q

  section_profiles:
    enabled: true

    input_dirs:
      normalized_root: database/normalized

    output:
      run_output_root: runs/analysis_section_profiles
      stable_output_dir: database/analysis/section_profiles
      write_stable_copy: false

    selection:
      points: all
      instruments: all
      start_date: null
      end_date: null

    defaults:
      x_axis: distance_m
      y_axis: depth_m
      chart_type: scatter

    allowed:
      x_columns:
        - distance_m
        - point_index
        - station_id
      y_columns:
        - depth_m
        - velocity_mean_m_s
        - area_m2
        - q_m3s
        - q_ls
        - percent_q
        - temperature_c
      chart_types:
        - scatter
        - bar

    instruments:
      nivus:
        enabled: true
        code: NV
        points_table: nivus/Points

      flowtracker:
        enabled: true
        code: FT
        points_table: flowtracker/Points

      molinete:
        enabled: true
        code: ML
        points_table: molinete/Points

    excel:
      enabled: true
      include_summary: true
      include_chart: true
      chart_anchor: H2
      sheet_name_template: "{station_id}_{measurement_date}_{instrument_code}"
      output_name_template: "section_profile_{y_axis}_by_{x_axis}_{instrument_tag}_{points_tag}_{date_range}.xlsx"

  stage_discharge:
    enabled: true

    input_dirs:
      normalized_root: database/normalized
      manual_stage_root: database/external/normalized/manual_stage

    output:
      run_output_root: runs/analysis_stage_discharge
      stable_output_dir: database/analysis/stage_discharge
      write_stable_copy: true

    interactive_defaults:
      instruments:
        - nivus
        - flowtracker
        - molinete
      ranking:
        - nivus
        - flowtracker
        - molinete
      include_best_ranked: true
      depth_mode: both
      instrument_stage_mode: both
      outlier_method: mad
      z_thresh: 3.0
      mad_thresh: 3.5
      coherence: true
      models:
        - poly1
        - poly2
        - power
        - power_log

    selection:
      points: all
      instruments: all
      start_date: null
      end_date: null
      depth_mode: both
      instrument_stage_mode: both
      include_best_ranked: true

    instrument_selection:
      ranking:
        - nivus
        - flowtracker
        - molinete

    instruments:
      nivus:
        code: NV
        enabled: true
        summary_table: nivus/Summary
        q_column: q_total_ls
        q_unit: l/s
        stage_sources:
          mean:
            column: depth_mean_m
            enabled: true
          max:
            column: depth_max_m
            enabled: false

      flowtracker:
        code: FT
        enabled: true
        summary_table: flowtracker/Summary
        q_column: q_total_ls
        q_unit: l/s
        stage_sources:
          mean:
            column: depth_mean_m
            enabled: true
          max:
            column: depth_max_m
            enabled: false

      molinete:
        code: ML
        enabled: true
        summary_table: molinete/Summary
        q_column: q_total_ls
        q_unit: l/s
        stage_sources:
          mean:
            column: depth_mean_m
            enabled: true
          max:
            column: depth_max_m
            enabled: true

measuring_instruments:
  - code: NV
    name: Nivus
    subdir: nivus
    summary_format: matrix
    flow_unit: l/s
    flow_row_label: "q [l/s]"
    time_row_label: "etime"

  - code: FT
    name: FlowTracker
    subdir: flowtracker
    summary_format: wide
    flow_column: q_total_ls
    flow_unit: l/s

  - code: ML
    name: Molinete
    subdir: molinete
    summary_format: wide
    flow_column: caudal
    flow_unit: m3/s
