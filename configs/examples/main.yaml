project:
  name: aforix
  description: Pipeline para procesamiento de datos de aforos
  timezone: America/Montevideo

paths:
  raw_data_dir: data/raw
  runs_root: runs
  database_root: database

ingest:
  flowtracker:
    enabled: true
    raw_subdir: FT
    spec_path: configs/specs/flowtracker.yaml

  molinete:
    enabled: true
    raw_subdir: ML
    sheet_name: Datos

  nivus:
    enabled: true
    raw_subdir: NV

  m9:
    enabled: true
    raw_subdir: M9

build_groups:
  enabled: true
  input_runs_root: runs
  output_dir: database/raw_canonical

  groups: #define qué grupos procesa build-groups.
    - Summary
    - Points
    - Sections
    - Gates

  concat_groups: #define cuáles grupos se concatenan en un único CSV.
    - Summary

  sources:
    - flowtracker
    - molinete
    - nivus

  column_aliases:
    flowtracker:
      Summary:
        nombre_del_fichero: file_name
        fecha_y_hora_de_inicio: start_date_and_time
        nom_del_punto_de_aforo: site_name
        operadores: operators
        tipo_de_sensor: sensor_type
        numero_de_serie_number: serial_number
        version_de_software: software_ver
        version_de_cpu: cpu_firmware_version
        factor_de_correccion_montaje_percent: mounting_correction_percent
        int_de_promediado_sec: averaging_interval_sec
        sistema_de_unidades: unit_system
        ecuacion_de_calculo_del_caudal: discharge_equation
        margen_de_inicio: start_edge
        number_estaciones: number_stations
        ancho_total_m: total_width_m
        area_total_m2: total_area_m2
        caudal_total_m3_s: total_discharge_m3_s
        calado_medido_m: mean_depth_m
        velocidad_media_m_s: mean_velocity_m_s
        snr_promedio_db: mean_snr_db
        verr_promedio_m_s: mean_verr_m_s
        temp_promedio_degc: mean_temp_degc
        bnd_promedio: mean_bnd
        condiciones_de_contorno_bnd: boundary_condition_bnd
        discharge_uncertainty_iso_total_percent: discharge_uncertainty_iso_overall_percent
        discharge_uncertainty_iso_precision_percent: discharge_uncertainty_iso_accuracy_percent
        discharge_uncertainty_iso_calado_percent: discharge_uncertainty_iso_depth_percent
        discharge_uncertainty_iso_velocidad_percent: discharge_uncertainty_iso_velocity_percent
        discharge_uncertainty_iso_ancho_percent: discharge_uncertainty_iso_width_percent
        discharge_uncertainty_iso_metodo_percent: discharge_uncertainty_iso_method_percent
        discharge_uncertainty_iso_number_estaciones_percent: discharge_uncertainty_iso_number_stations_percent
        discharge_uncertainty_statistical_total_percent: discharge_uncertainty_statistical_overall_percent
        discharge_uncertainty_statistical_precision_percent: discharge_uncertainty_statistical_accuracy_percent
        discharge_uncertainty_statistical_calado_percent: discharge_uncertainty_statistical_depth_percent
        discharge_uncertainty_statistical_velocidad_percent: discharge_uncertainty_statistical_velocity_percent
        discharge_uncertainty_statistical_ancho_percent: discharge_uncertainty_statistical_width_percent

normalize:
  enabled: true
  registry_dir: configs/normalization
  input_dir: database/raw_canonical
  output_dir: database/normalized

  groups:
    - Summary
    - Points
    - Sections
    - Gates

  concat_groups:
    - Summary
    - Points

  sources:
    - flowtracker
    - molinete
    - nivus

validation:
  enabled: true
  strict: false
  input_dir: database/normalized
  output_dir: database/validation

  traceability_columns:
    - station_id
    - station_name
    - measurement_date
    - measurement_time
    - instrument
    - source_file
    - source_run_dir
    - run_id

  keys:
    - instrument
    - station_id
    - measurement_date
    - measurement_time

  checks:
    required_columns: true
    duplicates: true
    completeness: true
    ranges: true
    hydraulic_consistency: true

  required_columns:
    Summary:
      - station_id
      - station_name
      - measurement_date
      - measurement_time
      - instrument
      - source_file
      - source_run_dir
      - run_id
      - q_total_m3s
      - q_total_ls
      - area_total_m2
    Points:
      - station_id
      - station_name
      - measurement_date
      - measurement_time
      - instrument
      - source_file
      - source_run_dir
      - run_id
      - point_index
      - distance_m
      - depth_m
      - area_m2
      - q_m3s
      - q_ls

  completeness:
    critical_columns:
      Summary:
        - station_id
        - measurement_date
        - measurement_time
        - instrument
        - q_total_m3s
      Points:
        - station_id
        - measurement_date
        - measurement_time
        - instrument
        - q_m3s

  hydraulic_consistency:
    q_tolerance_pct: 1.0
    area_tolerance_pct: 1.0

  ranges:
    Summary:
      area_total_m2:
        min: 0
      width_total_m:
        min: 0
      depth_mean_m:
        min: 0
      temperature_c:
        min: -5
        max: 45
    Points:
      depth_m:
        min: 0
      area_m2:
        min: 0
      temperature_c:
        min: -5
        max: 45

export:
  tables:
    enabled: true
    input_dir: database/normalized
    output_dir: outputs/tables

  excel:
    enabled: true
    input_dir: database/normalized
    output_dir: outputs/excel