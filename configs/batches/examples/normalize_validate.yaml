version: 1

batch:
  id: normalize_validate
  name: Normalize and validate pipeline
  description: Test pipeline for normalization and validation using existing grouped datasets.

project:
  main_config: configs/examples/main.yaml

execution:
  output_dir: runs/batch
  create_manifest: true
  stop_on_error: true

variables:
  main_config: configs/examples/main.yaml

steps:

  - id: config_check
    command: config-check
    enabled: true
    params:
      config: ${main_config}

  - id: normalize
    command: normalize.run
    enabled: true
    params:
      config: ${main_config}

  - id: validate
    command: validate.run
    enabled: true
    params:
      config: ${main_config}
