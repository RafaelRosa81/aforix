version: 1

batch:
  id: correlation_gauges_vs_stations_pairs
  name: Correlation gauges vs stations with explicit pairs
  description: Run correlation analysis between selected gauging points and selected external stations.

project:
  main_config: configs/examples/main.yaml

execution:
  output_dir: runs/batch
  create_manifest: true
  stop_on_error: true

variables:
  main_config: configs/examples/main.yaml
  timestep: daily

  # gauges_vs_stations pair format:
  # [station_id gauge_point]
  #
  # Example below compares:
  # station 44 with gauge point 1
  # station 117 with gauge point 8
  # station 10 with gauge point 13
  gauge_station_pairs: "[44 1] [117 8] [10 13]"

steps:

  - id: config_check
    command: config-check
    enabled: true
    params:
      config: ${main_config}

  - id: correlation_gauges_vs_stations_pairs
    command: analysis.correlation
    enabled: true
    params:
      config: ${main_config}
      type: gauges_vs_stations
      timestep: ${timestep}
      all_pairs: false
      pairs: ${gauge_station_pairs}
