version: 1

batch:
  id: correlation_gauges_vs_model
  name: Correlation gauges vs model
  description: Run correlation analysis between normalized gauging points and model outputs.

project:
  main_config: configs/examples/main.yaml

execution:
  output_dir: runs/batch
  create_manifest: true
  stop_on_error: true

variables:
  main_config: configs/examples/main.yaml
  correlation_points: 1,8,13
  ranking: NV FT ML
  timestep: daily

steps:

  - id: config_check
    command: config-check
    enabled: true
    params:
      config: ${main_config}

  - id: correlation_gauges_vs_model
    command: analysis.correlation
    enabled: true
    params:
      config: ${main_config}
      type: gauges_vs_model
      points: ${correlation_points}
      ranking: ${ranking}
      timestep: ${timestep}
