version: 1

batch:
  id: correlation_model_vs_stations
  name: Correlation model vs stations
  description: Run correlation analysis between hydrological model outputs and external stations.

project:
  main_config: configs/examples/main.yaml

execution:
  output_dir: runs/batch
  create_manifest: true
  stop_on_error: true

variables:
  main_config: configs/examples/main.yaml
  timestep: daily

steps:

  - id: config_check
    command: config-check
    enabled: true
    params:
      config: ${main_config}

  - id: correlation_model_vs_stations
    command: analysis.correlation
    enabled: true
    params:
      config: ${main_config}
      type: model_vs_stations
      timestep: ${timestep}
      all_pairs: true
