version: 1

batch:
  id: check_only
  name: Check-only batch
  description: Minimal batch used to validate batch infrastructure and main config loading.

project:
  main_config: configs/examples/main.yaml

execution:
  output_dir: runs/batch
  create_manifest: true
  stop_on_error: true
  continue_on_error: false

variables:
  main_config: configs/examples/main.yaml

steps:
  - id: config_check
    command: config-check
    enabled: true
    params:
      config: ${main_config}
