# ============================================================
# Atomic example: correlation - gauges_vs_stations
# ============================================================
#
# Objetivo:
#   Correlacionar aforos medidos contra estaciones DINAGUA.
#
# Parámetros reales aceptados:
#   config
#   type
#   ranking
#   all_pairs
#   pairs
#   points
#   timestep
#   start_date
#   end_date
#   match_mode
#   window_days
#
# type:
#   gauges_vs_model
#   gauges_vs_stations
#   model_vs_stations
#
# all_pairs:
#   true  -> usa todos los pares disponibles.
#   false -> usa solamente pairs.
#
# pairs:
#   Formato:
#     "[station point] [station point]"
#
# Ejemplo:
#   "[44 5] [115 11]"
#
# match_mode:
#   exact
#   window
#
# timestep:
#   daily
#   monthly
#
# Outputs esperados:
#   runs/analysis_correlation/<timestamp>/

version: 1

batch:
  id: atomic_correlation_gauges_vs_stations
  name: Atomic correlation gauges vs stations
  description: Correlación entre aforos y estaciones DINAGUA.

project:
  main_config: configs/examples/main.yaml

execution:
  output_dir: runs/batch
  create_manifest: true
  stop_on_error: true

variables:
  main_config: configs/examples/main.yaml
  ranking: NV FT ML
  start_date: 2025-01-01
  end_date: 2026-12-31
  pairs: "[44 5] [115 11]"

steps:
  - id: correlation_gauges_vs_stations
    command: analysis.correlation
    enabled: true
    params:
      config: ${main_config}

      type: gauges_vs_stations

      ranking: ${ranking}

      # true usa todos los pares posibles.
      all_pairs: false

      # Pares explícitos.
      pairs: ${pairs}

      # daily o monthly.
      timestep: daily

      start_date: ${start_date}
      end_date: ${end_date}

      # exact o window.
      match_mode: window

      # Ventana de matching en días.
      window_days: 3
