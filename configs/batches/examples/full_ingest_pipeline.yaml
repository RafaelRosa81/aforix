version: 1

batch:
  id: full_ingest_pipeline
  name: Full ingest pipeline
  description: End-to-end ingest, grouping, normalization, validation, export and analysis pipeline.

project:
  main_config: configs/examples/main.yaml

execution:
  output_dir: runs/batch
  create_manifest: true
  stop_on_error: true

variables:
  main_config: configs/examples/main.yaml
  export_format: xlsx
  grouping: monthly
  analysis_points: P1,P8,P13
  analysis_instruments: NV,FT,ML

steps:

  - id: config_check
    command: config-check
    enabled: true
    params:
      config: ${main_config}

  - id: ingest_flowtracker
    command: ingest.flowtracker
    enabled: true
    params:
      config: ${main_config}

  - id: ingest_molinete
    command: ingest.molinete
    enabled: true
    params:
      config: ${main_config}

  - id: ingest_nivus
    command: ingest.nivus
    enabled: true
    params:
      config: ${main_config}

  - id: build_groups
    command: build-groups
    enabled: true
    params:
      config: ${main_config}

  - id: normalize
    command: normalize.run
    enabled: true
    params:
      config: ${main_config}

  - id: validate
    command: validate.run
    enabled: true
    params:
      config: ${main_config}

  - id: export_summary
    command: export.tables
    enabled: true
    params:
      config: ${main_config}
      table: Summary
      grouping: ${grouping}
      format: ${export_format}

  - id: analyze_quality
    command: analysis.quality
    enabled: true
    params:
      config: ${main_config}
      aggregation: daily
      all_months: true

  - id: analyze_stage_discharge
    command: analysis.stage-discharge
    enabled: true
    params:
      config: ${main_config}
      points: ${analysis_points}
      instruments: ${analysis_instruments}
      plots: true
      excel: true

  - id: analyze_section_profiles
    command: analysis.section-profiles
    enabled: true
    params:
      config: ${main_config}
      points: ${analysis_points}
      instruments: ${analysis_instruments}
