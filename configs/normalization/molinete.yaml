instrument: molinete

tables:

  Summary:
    canonical_name: summary

    metadata:
      station_id:
        sources:
          - station_id
          - estacion
          - estacion_n
          - estacion_numero
      station_name:
        sources:
          - station_name
          - nombre
      measurement_date:
        sources:
          - measurement_date
          - fecha
      measurement_time:
        sources:
          - measurement_time
          - hora_ini
          - start_time
      instrument:
        sources:
          - instrument
          - source
      source_file:
        sources:
          - source_file
          - raw_source_file
          - source_csv
          - input_file
          - input_path
      source_run_dir:
        sources:
          - source_run_dir
      run_id:
        sources:
          - run_id

    metadata_policy:
      station_id:
        remove_prefixes:
          - P
        digits_only: true
      station_code:
        enabled: true
        prefix: P
      measurement_date:
        input_formats:
          - "%Y%m%d"
          - "%Y-%m-%d"
          - "%Y/%m/%d"
          - "%m/%d/%Y"
          - "%d/%m/%Y"
          - "%Y-%m-%d %H:%M:%S"
          - "%Y/%m/%d %H:%M:%S"
          - "%m/%d/%Y %H:%M:%S"
          - "%d/%m/%Y %H:%M:%S"
        output_format: "%Y%m%d"
      measurement_time:
        input_formats:
          - "%H%M%S"
          - "%H:%M:%S"
          - "%H:%M"
          - "%Y-%m-%d %H:%M:%S"
          - "%Y/%m/%d %H:%M:%S"
          - "%m/%d/%Y %H:%M:%S"
          - "%d/%m/%Y %H:%M:%S"
        output_format: "%H%M%S"

    columns:
      station_id:
        source: station_id
        dtype: string

      station_name:
        sources:
          - station_name
          - nombre
        dtype: string

      measurement_date:
        source: measurement_date
        dtype: string

      measurement_time:
        source: measurement_time
        dtype: string

      instrument:
        source: instrument
        dtype: string

      source_file:
        sources:
          - source_file
          - raw_source_file
          - source_csv
        dtype: string

      source_run_dir:
        source: source_run_dir
        dtype: string

      run_id:
        source: run_id
        dtype: string

      q_total_m3s:
        sources:
          - q_total_m3s
          - q_m3s
          - total_discharge_m3s
          - total_discharge_m3_s
        dtype: float

      q_total_ls:
        source: __derived__
        dtype: float

      area_total_m2:
        sources:
          - area_total_m2
          - area_m2
          - total_area_m2
        dtype: float

      width_total_m:
        sources:
          - width_total_m
          - ancho_m
          - width_m
        dtype: float

      velocity_mean_m_s:
        sources:
          - velocity_mean_m_s
          - vel_media_ms
          - mean_velocity_ms
        dtype: float

      depth_mean_m:
        sources:
          - depth_mean_m
          - prof_media_m
          - mean_depth_m
        dtype: float

      temperature_c:
        source: temperature_c
        dtype: float

      watercourse:
        source: curso
        dtype: string

      start_time:
        source: start_time
        dtype: string

      end_time:
        source: end_time
        dtype: string

      max_depth_m:
        source: prof_max_m
        dtype: float

      coordinate_y:
        source: coord_y
        dtype: float

      coordinate_x:
        source: coord_x
        dtype: float

      observations:
        source: observaciones
        dtype: string

    derived:
      q_total_ls:
        from: q_total_m3s
        operation: multiply
        value: 1000

    required:
      - station_id
      - measurement_date
      - measurement_time
      - instrument
      - q_total_m3s

    transforms:
      - name: strip_strings
      - name: numeric_commas_to_dots
      - name: enforce_dtypes

    qc:
      non_negative:
        - q_total_m3s
        - q_total_ls
        - area_total_m2
        - width_total_m
        - depth_mean_m


  Points:
    canonical_name: points

    metadata:
      station_id:
        sources:
          - station_id
          - estacion
          - estacion_n
          - estacion_numero
      station_name:
        sources:
          - station_name
          - nombre
      measurement_date:
        sources:
          - measurement_date
          - fecha
      measurement_time:
        sources:
          - measurement_time
          - hora_ini
          - start_time
      instrument:
        sources:
          - instrument
          - source
      source_file:
        sources:
          - source_file
          - raw_source_file
          - source_csv
          - input_file
          - input_path
      source_run_dir:
        sources:
          - source_run_dir
      run_id:
        sources:
          - run_id

    metadata_policy:
      station_id:
        remove_prefixes:
          - P
        digits_only: true
      station_code:
        enabled: true
        prefix: P
      measurement_date:
        input_formats:
          - "%Y%m%d"
          - "%Y-%m-%d"
          - "%Y/%m/%d"
          - "%m/%d/%Y"
          - "%d/%m/%Y"
          - "%Y-%m-%d %H:%M:%S"
          - "%Y/%m/%d %H:%M:%S"
          - "%m/%d/%Y %H:%M:%S"
          - "%d/%m/%Y %H:%M:%S"
        output_format: "%Y%m%d"
      measurement_time:
        input_formats:
          - "%H%M%S"
          - "%H:%M:%S"
          - "%H:%M"
          - "%Y-%m-%d %H:%M:%S"
          - "%Y/%m/%d %H:%M:%S"
          - "%m/%d/%Y %H:%M:%S"
          - "%d/%m/%Y %H:%M:%S"
        output_format: "%H%M%S"

    columns:
      station_id:
        source: station_id
        dtype: string

      station_name:
        sources:
          - station_name
          - nombre
        dtype: string

      measurement_date:
        source: measurement_date
        dtype: string

      measurement_time:
        source: measurement_time
        dtype: string

      instrument:
        source: instrument
        dtype: string

      source_file:
        sources:
          - source_file
          - raw_source_file
          - source_csv
        dtype: string

      source_run_dir:
        source: source_run_dir
        dtype: string

      run_id:
        source: run_id
        dtype: string

      point_index:
        source: point_index
        dtype: int

      point_label:
        sources:
          - point_label
          - vert_label
        dtype: string

      distance_m:
        sources:
          - distance_m
          - progr_m
        dtype: float

      depth_m:
        sources:
          - depth_m
          - prof_m
        dtype: float

      velocity_mean_m_s:
        sources:
          - velocity_mean_m_s
          - vel_media_vert_ms
          - vel_media_secc_ms
        dtype: float

      area_m2:
        source: area_m2
        dtype: float

      q_m3s:
        source: q_m3s
        dtype: float

      q_ls:
        source: __derived__
        dtype: float

      percent_q:
        sources:
          - percent_q
          - q_percent
        dtype: float

      temperature_c:
        source: temperature_c
        dtype: float

      angle_hor_deg:
        source: angle_hor_deg
        dtype: float

      n_velocity_points:
        source: n_points
        dtype: int

    derived:
      q_ls:
        from: q_m3s
        operation: multiply
        value: 1000

    required:
      - station_id
      - measurement_date
      - measurement_time
      - instrument
      - distance_m
      - depth_m

    transforms:
      - name: strip_strings
      - name: numeric_commas_to_dots
      - name: enforce_dtypes

    qc:
      non_negative:
        - depth_m
        - area_m2
