instrument: flowtracker

tables:

  Summary:
    canonical_name: summary

    metadata:
      station_id:
        sources:
          - station_id
          - file_name
          - input_file
      station_name:
        sources:
          - station_name
          - site_name
      measurement_date:
        sources:
          - measurement_date
          - start_date_time
      measurement_time:
        sources:
          - measurement_time
          - start_date_time
      instrument:
        sources:
          - instrument
          - source
      source_file:
        sources:
          - source_file
          - source_csv
          - input_file
          - input_path
      source_run_dir:
        sources:
          - source_run_dir
      run_id:
        sources:
          - run_id

    metadata_policy:
      station_id:
        remove_prefixes:
          - P
        digits_only: true
      station_code:
        enabled: true
        prefix: P
      measurement_date:
        input_formats:
          - "%Y%m%d"
          - "%Y-%m-%d"
          - "%Y/%m/%d"
          - "%Y-%m-%d %H:%M:%S"
          - "%Y/%m/%d %H:%M:%S"
          - "%m/%d/%Y %H:%M:%S"
        output_format: "%Y%m%d"
      measurement_time:
        input_formats:
          - "%H%M%S"
          - "%H:%M:%S"
          - "%Y-%m-%d %H:%M:%S"
          - "%Y/%m/%d %H:%M:%S"
          - "%m/%d/%Y %H:%M:%S"
        output_format: "%H%M%S"

    columns:
      station_id:
        source: station_id
        dtype: string

      station_name:
        sources:
          - station_name
          - site_name
        dtype: string

      measurement_date:
        source: measurement_date
        dtype: string

      measurement_time:
        source: measurement_time
        dtype: string

      instrument:
        source: instrument
        dtype: string

      source_file:
        sources:
          - source_file
          - source_csv
          - input_path
          - input_file
        dtype: string

      source_run_dir:
        source: source_run_dir
        dtype: string

      run_id:
        source: run_id
        dtype: string

      q_total_m3s:
        sources:
          - total_discharge_m3_s
          - total_discharge_m3s
          - discharge_m3_s
          - caudal_total_m3_s
        dtype: float

      q_total_ls:
        source: __derived__
        dtype: float

      area_total_m2:
        sources:
          - total_area_m2
          - area_m2
        dtype: float

      width_total_m:
        sources:
          - total_width_m
          - width_m
        dtype: float

      velocity_mean_m_s:
        sources:
          - mean_velocity_m_s
          - mean_velocity_ms
          - velocity_mean_m_s
        dtype: float

      depth_mean_m:
        sources:
          - mean_depth_m
          - depth_mean_m
        dtype: float

      temperature_c:
        sources:
          - mean_temp_degc
          - temperature_c
        dtype: float

    derived:
      q_total_ls:
        from: q_total_m3s
        operation: multiply
        value: 1000

    required:
      - station_id
      - measurement_date
      - measurement_time
      - instrument
      - q_total_m3s

    transforms:
      - name: strip_strings
      - name: numeric_commas_to_dots
      - name: enforce_dtypes

    qc:
      non_negative:
        - area_total_m2
        - width_total_m
        - depth_mean_m


  Points:
    canonical_name: points

    metadata:
      station_id:
        sources:
          - station_id
          - file_name
          - input_file
      station_name:
        sources:
          - station_name
          - site_name
      measurement_date:
        sources:
          - measurement_date
          - start_date_time
      measurement_time:
        sources:
          - measurement_time
          - start_date_time
      instrument:
        sources:
          - instrument
          - source
      source_file:
        sources:
          - source_file
          - source_csv
          - input_file
          - input_path
      source_run_dir:
        sources:
          - source_run_dir
      run_id:
        sources:
          - run_id

    metadata_policy:
      station_id:
        remove_prefixes:
          - P
        digits_only: true
      station_code:
        enabled: true
        prefix: P
      measurement_date:
        input_formats:
          - "%Y%m%d"
          - "%Y-%m-%d"
          - "%Y/%m/%d"
          - "%Y-%m-%d %H:%M:%S"
          - "%Y/%m/%d %H:%M:%S"
          - "%m/%d/%Y %H:%M:%S"
        output_format: "%Y%m%d"
      measurement_time:
        input_formats:
          - "%H%M%S"
          - "%H:%M:%S"
          - "%Y-%m-%d %H:%M:%S"
          - "%Y/%m/%d %H:%M:%S"
          - "%m/%d/%Y %H:%M:%S"
        output_format: "%H%M%S"

    columns:
      station_id:
        source: station_id
        dtype: string

      station_name:
        sources:
          - station_name
          - site_name
        dtype: string

      measurement_date:
        source: measurement_date
        dtype: string

      measurement_time:
        source: measurement_time
        dtype: string

      instrument:
        source: instrument
        dtype: string

      source_file:
        sources:
          - source_file
          - source_csv
          - input_path
          - input_file
        dtype: string

      source_run_dir:
        source: source_run_dir
        dtype: string

      run_id:
        source: run_id
        dtype: string

      point_index:
        sources:
          - point_index
          - station
        dtype: int

      point_label:
        sources:
          - point_label
          - station
        dtype: string

      distance_m:
        sources:
          - distance_m
          - location_m
        dtype: float

      depth_m:
        source: depth_m
        dtype: float

      velocity_mean_m_s:
        sources:
          - velocity_mean_m_s
          - velocity_m_s
          - mean_velocity_m_s
        dtype: float

      area_m2:
        source: area_m2
        dtype: float

      q_m3s:
        sources:
          - q_m3s
          - discharge_m3_s
        dtype: float

      q_ls:
        source: __derived__
        dtype: float

      percent_q:
        sources:
          - percent_q
          - percent_discharge
        dtype: float

      temperature_c:
        source: temperature_c
        dtype: float

    derived:
      q_ls:
        from: q_m3s
        operation: multiply
        value: 1000

    required:
      - station_id
      - measurement_date
      - measurement_time
      - instrument
      - distance_m
      - depth_m

    transforms:
      - name: strip_strings
      - name: numeric_commas_to_dots
      - name: enforce_dtypes

    qc:
      non_negative:
        - depth_m
        - area_m2
